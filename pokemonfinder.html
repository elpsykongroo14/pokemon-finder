<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="pokemonfinder.css" />
    <script src="pokemonfinder.js" defer></script>
  </head>
  <body>
    <!-- ── Fixed UI ─────────────────────────────────────────── -->
    <button
      id="favorites-toggle"
      class="favorite-toggle"
      aria-label="Open favorites"
    >
      ❤
    </button>
    <button id="library-btn" class="library-btn">TCG Library</button>

    <!-- ── Overlay + Favorites drawer ───────────────────────── -->
    <div id="overlay" class="overlay hidden"></div>

    <div
      id="favorites-drawer"
      class="favorites-drawer"
      role="dialog"
      aria-label="Favorites"
    >
      <div class="drawer-header">
        <h3>Favorites</h3>
        <button id="close-drawer" class="close-drawer" aria-label="Close">
          ✕
        </button>
      </div>
      <div id="favorites-container" class="favorites-container"></div>
    </div>

    <!-- ── Main app ──────────────────────────────────────────── -->
    <div class="container">
      <!-- Title with inline SVG pokéball -->
      <div class="site-title">
        <!--
          Monochrome pokéball as inline SVG.
          Why inline and not an <img>? Because inline SVG:
            1. Inherits CSS colour — so it naturally matches whatever
               theme you apply without touching a separate file.
            2. Is animatable with CSS (the spin-on-hover is just
               a CSS transform on .pokeball-icon).
            3. Costs zero extra network requests.

          The pokéball has three parts:
            - Top half circle (accent colour)
            - Bottom half circle (slightly muted)
            - Centre dividing line + white button circle
        -->
        <svg
          class="pokeball-icon"
          viewBox="0 0 40 40"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <!-- Outer circle border -->
          <circle
            cx="20"
            cy="20"
            r="18.5"
            stroke="rgba(255,255,255,0.18)"
            stroke-width="1"
          />
          <!-- Top half — accent fill -->
          <path
            d="M1.5 20 A18.5 18.5 0 0 1 38.5 20 Z"
            fill="#e8754a"
            opacity="0.9"
          />
          <!-- Bottom half — darker tint -->
          <path
            d="M1.5 20 A18.5 18.5 0 0 0 38.5 20 Z"
            fill="rgba(255,255,255,0.06)"
          />
          <!-- Horizontal dividing band -->
          <rect
            x="1.5"
            y="18.5"
            width="37"
            height="3"
            fill="rgba(255,255,255,0.18)"
          />
          <!-- Centre button ring -->
          <circle
            cx="20"
            cy="20"
            r="5.5"
            fill="var(--bg-card)"
            stroke="rgba(255,255,255,0.22)"
            stroke-width="1.5"
          />
          <!-- Centre button inner dot -->
          <circle cx="20" cy="20" r="2.5" fill="rgba(255,255,255,0.35)" />
        </svg>

        <h1>Poké<span>mon</span> Finder</h1>
      </div>

      <p class="subtitle">Search for any Pokémon</p>

      <!-- Search -->
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Name or ID (1 – 1025)"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="searchBtn">Search</button>
      </div>

      <button class="random-btn" id="randomBtn">Random Pokémon</button>

      <!-- Static suggestion chips -->
      <div class="suggestions">
        <span class="suggestion-label">Try:</span>
        <button class="suggestion" data-name="charizard">Charizard</button>
        <button class="suggestion" data-name="mewtwo">Mewtwo</button>
        <button class="suggestion" data-name="eevee">Eevee</button>
        <button class="suggestion" data-name="gengar">Gengar</button>
        <button class="suggestion" data-name="snorlax">Snorlax</button>
      </div>

      <!-- Cards wrapper — becomes a 2-col grid in compare mode -->
      <div id="cards-wrapper">
        <!-- Primary Pokémon card -->
        <div class="pokemon-card hidden" id="pokemonCard">
          <div class="img-container">
            <img id="pokemonImg" src="" alt="Pokémon artwork" />
            <div class="spinner hidden" id="spinner"></div>
          </div>
          <h2 id="pokemonName"></h2>
          <div class="pokemon-id" id="pokemonId"></div>
          <div class="types" id="pokemonTypes"></div>
          <div class="pokemon-meta" id="pokemon-meta"></div>
          <p id="flavor-text" class="flavor-text"></p>
          <button id="shiny-btn">Toggle Shiny</button>
          <div class="stats" id="pokemonStats"></div>
          <h3 class="evolution-title">Evolution Chain</h3>
          <div class="evolution-chain" id="evolution-chain"></div>
          <div id="type-effectiveness" class="type-effectiveness"></div>
          <button id="favorite-btn" class="favorite-btn">🤍 Favorite</button>
          <button id="team-btn" class="team-btn">+ Add to Team</button>
          <button id="tcg-btn" class="tcg-btn">View TCG Cards</button>
        </div>

        <!-- Compare card — revealed when compare mode is active -->
        <div id="compare-card" class="pokemon-card hidden">
          <div class="img-container">
            <img id="compareImg" src="" alt="Pokémon artwork" />
          </div>
          <h2 id="compareName"></h2>
          <div class="pokemon-id" id="compareId"></div>
          <div class="types" id="compareTypes"></div>
          <div class="stats" id="compareStats"></div>
        </div>
      </div>

      <!-- Compare controls — live below the cards -->
      <button id="compare-btn" class="compare-btn">Compare Mode</button>
      <div id="compare-hint" class="compare-hint hidden"></div>

      <!-- Search history chips — rendered by JS -->
      <div
        id="search-history"
        class="suggestions"
        style="margin-top: 12px"
      ></div>

      <!-- Error message -->
      <div class="error hidden" id="error"></div>
    </div>
    <!-- end .container -->

    <!-- ── Team strip ─────────────────────────────────────────── -->
    <div id="team-strip" class="team-strip">
      <div class="team-title">My Team</div>
      <div id="team-slots" class="team-slots"></div>
    </div>

    <!-- ── TCG Library view (SPA swap) ────────────────────────── -->
    <div id="library-view" class="library-view hidden">
      <div class="library-header">
        <button id="library-back" class="library-back">← Back</button>
        <h2 class="library-title">Card Library</h2>
        <div class="library-search-box">
          <input
            type="text"
            id="library-search"
            placeholder="Search Pokémon…"
            autocomplete="off"
          />
          <button id="library-search-btn">Search</button>
        </div>
      </div>

      <div id="card-panel" class="card-panel hidden">
        <div class="card-panel-header">
          <button id="card-panel-back" class="card-panel-back">
            ← All Results
          </button>
          <h3 id="card-panel-title" class="card-panel-title"></h3>
          <div class="sort-controls">
            <select id="sort-select" class="sort-select">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="rarity">By rarity</option>
            </select>
          </div>
        </div>
        <div id="card-grid" class="card-grid"></div>
      </div>
    </div>
  </body>
</html>
